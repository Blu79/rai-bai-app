<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .card { background-color: #1e293b; border-radius: 12px; padding: 15px; }
    </style>
</head>
<body class="p-4">
    <div class="card space-y-4">
        <h2 class="text-green-400 font-bold text-center">LAM05 - CONTROL</h2>
        
        <div>
            <p class="text-xs text-gray-400 mb-2">SITE KJC</p>
            <div class="grid grid-cols-2 gap-2">
                <label><input type="checkbox" name="site" value="QQ88"> QQ88</label>
                <label><input type="checkbox" name="site" value="RR88"> RR88</label>
            </div>
        </div>

        <div>
            <p class="text-xs text-gray-400 mb-2">DỮ LIỆU BASE64</p>
            <textarea id="base64Input" class="w-full h-20 bg-gray-900 border border-gray-700 rounded p-2 text-sm" placeholder="Dán dữ liệu tại đây..."></textarea>
        </div>

        <button onclick="startAuto()" class="w-full bg-emerald-500 hover:bg-emerald-600 py-3 rounded-lg font-bold flex justify-center items-center gap-2">
            ⚡ KHỞI CHẠY AUTO
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Mở rộng app hết màn hình

        async function startAuto() {
            const base64 = document.getElementById('base64Input').value;
            const selectedSites = Array.from(document.querySelectorAll('input[name="site"]:checked')).map(cb => cb.value);

            if (!base64 || selectedSites.length === 0) {
                alert("Vui lòng nhập dữ liệu và chọn ít nhất 1 site!");
                return;
            }

            // Gửi dữ liệu về Server của bạn
            const response = await fetch('https://your-server-api.com/run-auto', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: tg.initDataUnsafe.user?.id,
                    sites: selectedSites,
                    data: base64
                })
            });

            const result = await response.json();
            alert("Trạng thái: " + result.message);
        }
    </script>
</body>
</html>
